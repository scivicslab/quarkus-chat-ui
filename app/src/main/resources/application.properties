# ============================================================
# Coder Agent - application.properties
# ============================================================

# Provider selection: claude | codex | openai-compat
chat-ui.provider=claude

# Multi-user mode: each user gets isolated conversation history, identified by BasicAuth username
# Activate at startup: java -Dchat-ui.multi-user=true -jar quarkus-chat-ui.jar
# (or for vLLM: java -Dchat-ui.multi-user=true -Dchat-ui.provider=openai-compat -jar ...)
chat-ui.multi-user=false

# UI title shown in the browser tab and header
chat-ui.title=Quarkus Chat UI

# Keyboard shortcut preset for submitting messages: default | mac | vim
chat-ui.keybind=default

# ---- Authentication ----
# API key (fallback if not set via environment variable or Web UI)
# For Claude: set ANTHROPIC_API_KEY env var instead
# For Codex: set OPENAI_API_KEY env var instead
# chat-ui.api-key=

# ---- Claude / Codex CLI options ----
# CLI permission mode override. Each provider sets its own default (bypassPermissions).
# Uncomment to override: acceptEdits, default, auto, bypassPermissions, plan
# WARNING: acceptEdits does NOT cover Bash/curl — see PermissionModePostmortem_260404_oo01
# chat-ui.permission-mode=bypassPermissions

# Comma-separated list of tools auto-approved (e.g., Bash,Read,Write)
# chat-ui.allowed-tools=

# Session file base path (port or PUPS_SESSION_PATH suffix is appended)
chat-ui.session-file=.chat-ui-session

# ---- OpenAI-compatible provider ----
# Comma-separated list of server base URLs
chat-ui.servers=http://localhost:8000

# Default model for openai-compat provider (leave blank to auto-detect first available)
chat-ui.default-model=

# ---- Agent Loop (plugin-openai-compat-agent, openai-compat provider only) ----
# Enable tool calling via MCP for Local LLMs (vLLM, Ollama, etc.)
# chat-ui.agent-loop.enabled=false
# Comma-separated MCP server base URLs that provide tools to the agent
# chat-ui.agent-loop.mcp-urls=http://localhost:8888/mcp/_all
# Maximum tool-call iterations per user turn (prevents infinite loops)
# chat-ui.agent-loop.max-iterations=10

# ---- MCP Gateway registration (optional) ----
# chat-ui.gateway-url=http://localhost:9000

# ---- Quarkus settings ----
quarkus.mcp.server.server-info.name=chat-ui-${quarkus.http.port}
quarkus.http.port=8090

# CORS (required for MCP Streamable HTTP)
quarkus.http.cors=true
quarkus.http.cors.origins=/.*/
quarkus.log.level=INFO
quarkus.log.category."com.scivicslab".level=INFO

# Static web resources (index.html, app.js, styles.css)
quarkus.http.static-resources.root-path=/
quarkus.http.static-resources.locations=META-INF/resources/
