# ============================================================
# Coder Agent - application.properties
# ============================================================

# Provider selection: claude | codex | openai-compat
coder-agent.provider=claude

# UI title shown in the browser tab and header
coder-agent.title=Coder Agent

# Keyboard shortcut preset for submitting messages: default | mac | vim
coder-agent.keybind=default

# ---- Authentication ----
# API key (fallback if not set via environment variable or Web UI)
# For Claude: set ANTHROPIC_API_KEY env var instead
# For Codex: set OPENAI_API_KEY env var instead
# coder-agent.api-key=

# ---- Claude / Codex CLI options ----
# Comma-separated list of tools auto-approved (e.g., Bash,Read,Write)
# coder-agent.allowed-tools=

# Session file base path (port or PUPS_SESSION_PATH suffix is appended)
coder-agent.session-file=.coder-agent-session

# ---- OpenAI-compatible provider ----
# Comma-separated list of server base URLs
coder-agent.servers=http://localhost:8000

# Default model for openai-compat provider (leave blank to auto-detect first available)
# coder-agent.default-model=

# ---- MCP Gateway registration (optional) ----
# coder-agent.gateway-url=http://localhost:9000

# ---- Quarkus settings ----
quarkus.http.port=8090
quarkus.log.level=INFO
quarkus.log.category."com.scivicslab".level=INFO

# Static web resources (index.html, app.js, styles.css)
quarkus.http.static-resources.root-path=/
quarkus.http.static-resources.locations=META-INF/resources/
