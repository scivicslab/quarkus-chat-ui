name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      - name: Run unit tests
        run: mvn test -DskipITs

  build-uber-jar:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      - name: Build uber-JAR
        run: mvn install -DskipTests -DskipITs -Dquarkus.package.jar.type=uber-jar
      - name: Rename artifact
        run: |
          TAG="${GITHUB_REF_NAME}"
          cp app/target/chat-ui-app-*-runner.jar "quarkus-chat-ui-${TAG}.jar"
          echo "ARTIFACT=quarkus-chat-ui-${TAG}.jar" >> $GITHUB_ENV
      - uses: actions/upload-artifact@v4
        with:
          name: uber-jar
          path: ${{ env.ARTIFACT }}

  release:
    needs: build-uber-jar
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: artifacts
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
